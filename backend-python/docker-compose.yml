services:
  db:
    image: postgres:16-alpine
    container_name: artigida-postgres
    environment:
      POSTGRES_DB: artigida
      POSTGRES_USER: artigida_app
      POSTGRES_PASSWORD: artigida_secret
    ports:
      - "5433:5432"
    volumes:
      - artigida_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artigida_app -d artigida"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  artigida_pgdata:
