<div class="min-h-screen bg-brandLight flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-md bg-white rounded-3xl shadow-lg border border-gray-100 p-8">
    <div class="text-center mb-8">
      <span class="text-4xl">🍃</span>
      <h1 class="text-2xl font-extrabold text-brandDark mt-2">Kayıt Ol</h1>
      <p class="text-gray-500 text-sm mt-1">ArtıGıda ağına katılın</p>
    </div>
    <form class="space-y-4" (ngSubmit)="submit()">
      <div>
        <label class="text-sm font-bold text-gray-700">Ad Soyad</label>
        <input type="text" [(ngModel)]="name" name="name" required autocomplete="name" class="mt-1 w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm outline-none focus:border-brandGreen" />
      </div>
      <div>
        <label class="text-sm font-bold text-gray-700">E-posta</label>
        <input type="email" [(ngModel)]="email" name="email" required autocomplete="email" class="mt-1 w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm outline-none focus:border-brandGreen" />
      </div>
      <div>
        <label class="text-sm font-bold text-gray-700">Şifre</label>
        <input type="password" [(ngModel)]="password" name="password" required minlength="6" autocomplete="new-password" class="mt-1 w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm outline-none focus:border-brandGreen" />
      </div>
      <div>
        <label class="text-sm font-bold text-gray-700">Hesap Türü</label>
        <select [(ngModel)]="role" name="role" class="mt-1 w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm outline-none focus:border-brandGreen">
          <option value="user">Müşteri (Öğrenci)</option>
          <option value="business">İşletme</option>
        </select>
      </div>
      @if (errorMessage) { <p class="text-red-600 text-sm font-medium">{{ errorMessage }}</p> }
      <button type="submit" [disabled]="isLoading" class="w-full bg-brandGreen text-white py-3 rounded-xl font-bold hover:bg-green-700 transition disabled:opacity-50">
        {{ isLoading ? 'Kaydediliyor...' : 'Kayıt Ol' }}
      </button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-6">Zaten hesabınız var mı? <a routerLink="/login" class="text-brandGreen font-bold hover:underline">Giriş yapın</a></p>
  </div>
</div>
