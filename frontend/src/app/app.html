<app-navbar></app-navbar>
<main class="min-h-screen bg-brandLight">
  <router-outlet></router-outlet>
</main>

<!-- Modern Toast Container -->
<div class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none">
  <div *ngFor="let toast of toasts$ | async" 
       [ngClass]="{
         'bg-emerald-50 border-emerald-200 text-emerald-800': toast.type === 'success',
         'bg-rose-50 border-rose-200 text-rose-800': toast.type === 'error',
         'bg-blue-50 border-blue-200 text-blue-800': toast.type === 'info',
         'bg-amber-50 border-amber-200 text-amber-800': toast.type === 'warning'
       }"
       class="pointer-events-auto flex items-center justify-between p-4 rounded-2xl border shadow-lg transition-all transform translate-y-0 duration-300 animate-slide-in">
    <div class="flex items-center gap-3">
      <!-- Success Icon -->
      <svg *ngIf="toast.type === 'success'" class="w-5 h-5 text-emerald-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      <!-- Error Icon -->
      <svg *ngIf="toast.type === 'error'" class="w-5 h-5 text-rose-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      <!-- Info Icon -->
      <svg *ngIf="toast.type === 'info'" class="w-5 h-5 text-blue-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      <!-- Warning Icon -->
      <svg *ngIf="toast.type === 'warning'" class="w-5 h-5 text-amber-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
      </svg>
      <span class="text-sm font-semibold">{{ toast.message }}</span>
    </div>
    <button (click)="removeToast(toast.id)" class="text-gray-400 hover:text-gray-600 transition ml-3 flex-shrink-0">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
  </div>
</div>
